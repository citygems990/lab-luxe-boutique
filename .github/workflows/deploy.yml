name: Deploy to GitHub Pages
on:
  push:
    branches: "main" # или master, проверь как называется твоя ветка
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Строку cache удалили, ошибка Lock file is not found исчезнет!
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # Меняем dist на путь, куда TanStack Start обычно собирает статику
          path: .output/public 
  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
